; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
default_envs = esp32-c3
;default_envs = nodemcu-32s

[env]
board_build.partitions = src/no_ota.csv
monitor_filters = esp32_exception_decoder
lib_compat_mode=strict
lib_ldf_mode=deep+



[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
; framework = arduino, espidf
framework = arduino
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
monitor_speed = 115200
upload_port = /dev/cu.usbmodem14401
monitor_port = /dev/cu.usbmodem14401
;upload_port = /dev/cu.usbserial-0001
;monitor_port = /dev/cu.usbserial-0001
build_flags =
    -DCORE_DEBUG_LEVEL=3
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D CONFIG_ESP32C3_BROWNOUT_DET=1
    -D CONFIG_ESP32C3_BROWNOUT_DET_LVL_SEL=4 # 2.8V
    -Wno-error=int-in-bool-context
	!echo '#define GIT_SHA1_VERSION "'$(git log |head -1 |cut -c8-)'"' > src/version.h
lib_deps = 
	h2zero/NimBLE-Arduino@^2.0.0

#  DCORE_DEBUG_LEVEL=3 == INFO
